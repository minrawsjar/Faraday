[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
arc      = "${ARC_RPC_URL}"
ethereum = "${ETH_RPC_URL}"
arbitrum = "${ARB_RPC_URL}"
bnb      = "${BNB_RPC_URL}"

[etherscan]
arc = { key = "placeholder", url = "${ARC_EXPLORER_URL}" }
